<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>My AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; background: #0f1115; color: #eee; margin: 0; display: flex; flex-direction: column; height: 100vh; }
  header { padding: 16px; background: #171a21; font-weight: 600; border-bottom: 1px solid #262a33; }
  #chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 75%; padding: 10px 14px; border-radius: 12px; line-height: 1.4; white-space: pre-wrap; }
  .user { align-self: flex-end; background: #3b6fe0; color: white; }
  .assistant { align-self: flex-start; background: #23262f; }
  form { display: flex; padding: 12px; gap: 8px; background: #171a21; border-top: 1px solid #262a33; }
  input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #0f1115; color: white; font-size: 15px; }
  button { padding: 12px 18px; border-radius: 8px; border: none; background: #3b6fe0; color: white; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
  <header>My AI</header>
  <div id="chat"></div>
  <form id="form">
    <input id="input" placeholder="Type a message..." autocomplete="off" />
    <button id="send">Send</button>
  </form>
<script>
  const chat = document.getElementById('chat');
  const form = document.getElementById('form');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const conversationId = 'web-session';

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const message = input.value.trim();
    if (!message) return;
    addMessage('user', message);
    input.value = '';
    sendBtn.disabled = true;
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, conversationId })
      });
      const data = await res.json();
      if (data.reply) addMessage('assistant', data.reply);
      else addMessage('assistant', 'Error: ' + (data.error || 'unknown error'));
    } catch (err) {
      addMessage('assistant', 'Network error: ' + err.message);
    } finally {
      sendBtn.disabled = false;
    }
  });
</script>
</body>
</html>
