name: AI Self-Healer Loop
on:
  schedule:
    - cron: '*/5 * * * *'  # This checks your database automatically every 5 minutes
  workflow_dispatch:      # This lets you trigger it manually from your phone whenever you want!

jobs:
  fix-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run AI Fixer Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # 1. Fetch the latest error from Supabase using curl
          ERROR_DATA=$(curl -s -X GET "$SUPABASE_URL/rest/v1/error_logs?resolved=eq.false&limit=1" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY")

          if [ "$ERROR_DATA" == "[]" ] || [ -z "$ERROR_DATA" ]; then
            echo "No bugs found! System is running smoothly."
            exit 0
          fi

          # Extract error message and database row ID
          LOG_ID=$(echo $ERROR_DATA | grep -o '"id":[0-9]*' | head -1 | cut -d':' -f2)
          ERR_MSG=$(echo $ERROR_DATA | grep -o '"error_message":"[^"]*"' | head -1 | cut -d':' -f2 | tr -d '"')
          FILE_TO_FIX="index.html"

          echo "Found bug in $FILE_TO_FIX: $ERR_MSG"

          # 2. Ask AI to fix the file
          CURRENT_CODE=$(cat $FILE_TO_FIX | sed 's/"/\\"/g' | awk '{printf "%s\\n", $0}')
          PROMPT="The file $FILE_TO_FIX broke with this error: $ERR_MSG. Fix the JavaScript function so it works. Return ONLY the complete corrected HTML file code. Do not include markdown code blocks or backticks."
          
          AI_RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "{\"model\": \"gpt-4o-mini\", \"messages\": [{\"role\": \"user\", \"content\": \"$PROMPT\n\nCode:\n$CURRENT_CODE\"}]}")

          FIXED_CODE=$(echo $AI_RESPONSE | grep -o '"content":"[^"]*"' | cut -d':' -f2- | tr -d '"' | sed 's/\\n/\n/g')

          # 3. Save the fixed code back into index.html
          echo "$FIXED_CODE" > $FILE_TO_FIX

          # 4. Push the fix back to GitHub
          git config --global user.name "AI Self-Healer"
          git config --global user.email "ai-healer@github.com"
          git add $FILE_TO_FIX
          git commit -m "AI Auto-Fix: Resolved crash in $FILE_TO_FIX"
          git push

          # 5. Mark error as fixed in Supabase
          curl -X PATCH "$SUPABASE_URL/rest/v1/error_logs?id=eq.$LOG_ID" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"resolved": true}'
            
